<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หลังบ้านสภานักศึกษา | ReportCouncil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 30px;
            margin-top: 30px;
            margin-bottom: 60px;
        }
        .admin-sidebar {
            height: fit-content;
        }
        .admin-sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 15px;
        }
        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            border-radius: 10px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: all var(--transition-speed);
        }
        .sidebar-item:hover, .sidebar-item.active {
            background: rgba(79, 70, 229, 0.08);
            color: var(--primary-color);
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .admin-table th, .admin-table td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        .admin-table th {
            font-weight: 700;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .admin-table tr:hover {
            background: rgba(0, 0, 0, 0.01);
        }
        .badge-select {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            border: 1px solid rgba(0,0,0,0.1);
            outline: none;
            cursor: pointer;
        }
        .badge-select.pending { background: rgba(245, 158, 11, 0.1); color: var(--status-pending); }
        .badge-select.progress { background: rgba(59, 130, 246, 0.1); color: var(--status-progress); }
        .badge-select.resolved { background: rgba(16, 185, 129, 0.1); color: var(--status-resolved); }
        .badge-select.cancelled { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

        @media (max-width: 900px) {
            .admin-layout { grid-template-columns: 1fr; }
        }

        /* Responsive Table for Admin */
        @media (max-width: 768px) {
            .admin-table thead {
                display: none;
            }
            .admin-table, .admin-table tbody, .admin-table tr, .admin-table td {
                display: block;
                width: 100%;
            }
            .admin-table tr {
                margin-bottom: 20px;
                background: white;
                border: 1px solid var(--border-color);
                border-radius: 12px;
                padding: 15px;
                box-shadow: var(--shadow-sm);
            }
            .admin-table td {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                padding: 10px 0;
                border-bottom: 1px dashed var(--border-color);
            }
            .admin-table td:last-child {
                border-bottom: none;
            }
            .admin-table td::before {
                content: attr(data-label);
                font-weight: 700;
                color: var(--primary-color);
                font-size: 0.75rem;
                margin-bottom: 5px;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="container glass nav-container">
            <div class="logo">
                <i class="fa-solid fa-bullhorn"></i>
                Report<span>Council</span> <span style="font-size: 0.75rem; background: var(--secondary-color); color: white; padding: 2px 8px; border-radius: 10px; margin-left: 5px;">ADMIN</span>
            </div>
            <div class="nav-links">
                <a href="index.html">หน้าบ้านหน้าแรก</a>
                <a href="#" onclick="logout()" class="text-muted"><i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="admin-layout">
            <div class="glass glass-card admin-sidebar">
                <div class="text-center mb-3">
                    <i class="fa-solid fa-circle-user" style="font-size: 3rem; color: var(--primary-color);"></i>
                    <h4 class="mt-2" id="admin-name">ผู้ดูแลระบบสภา</h4>
                    <p class="text-muted" style="font-size: 0.8rem;">ผู้ดูแลระบบ (Admin)</p>
                </div>
                <div class="admin-sidebar-menu">
                    <a href="admin.html" class="sidebar-item active"><i class="fa-solid fa-list-check"></i> จัดการเรื่องร้องเรียน</a>
                    <a href="index.html" class="sidebar-item"><i class="fa-solid fa-house"></i> กลับสู่หน้าหลัก</a>
                    <a href="#" onclick="logout()" class="sidebar-item"><i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ</a>
                </div>
            </div>

            <div class="glass glass-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <div>
                        <h2>รายการร้องเรียนทั้งหมด</h2>
                        <p class="text-muted">ปรับปรุงสถานะหรือรายละเอียดเรื่องของนักศึกษา</p>
                    </div>
                </div>

                <div style="overflow-x: auto;">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>รหัสเรื่อง</th>
                                <th>หัวข้อ</th>
                                <th>หมวดหมู่</th>
                                <th>วันที่แจ้ง</th>
                                <th>สถานะ</th>
                                <th>การจัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="adminComplaintsTable">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('rep_user'));
            if (!user || user.role !== 'admin') {
                alert('คุณไม่มีสิทธิ์เข้าถึงหน้านี้ เฉพาะผู้ดูแลระบบเท่านั้น');
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('admin-name').textContent = user.username;

            loadAdminComplaints();
        });

        function logout() {
            localStorage.removeItem('rep_user');
            if (firebaseAppInitialized) {
                firebase.auth().signOut();
            }
            window.location.href = 'login.html';
        }

        async function loadAdminComplaints() {
            const tbody = document.getElementById('adminComplaintsTable');

            if (firebaseAppInitialized) {
                firebase.database().ref('complaints').on('value', (snapshot) => {
                    const data = snapshot.val();
                    const complaints = [];
                    for (let id in data) {
                        complaints.push({ firebaseId: id, ...data[id] });
                    }
                    renderTable(complaints);
                });
            } else {
                // LocalStorage Mock
                const complaints = JSON.parse(localStorage.getItem('university_complaints')) || [];
                renderTable(complaints);
            }
        }

        function renderTable(complaints) {
            const tbody = document.getElementById('adminComplaintsTable');
            tbody.innerHTML = '';

            if (complaints.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;" class="text-muted">ไม่มีข้อมูลเรื่องร้องเรียน</td></tr>`;
                return;
            }

            complaints.forEach((complaint, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td data-label="รหัสเรื่อง"><strong>${complaint.id}</strong></td>
                    <td data-label="รายละเอียด">
                        <div><strong>${complaint.title}</strong></div>
                        <div class="text-muted" style="font-size: 0.8rem;">${complaint.description || ''}</div>
                        ${complaint.imageUrl ? `<div style="margin-top: 8px;"><img src="${complaint.imageUrl}" style="max-height: 80px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); cursor: pointer;" onclick="window.open('${complaint.imageUrl}', '_blank')"></div>` : ''}
                        
                        <!-- Admin Reply Section -->
                        <div style="margin-top: 15px; padding-top: 10px; border-top: 1px dashed rgba(0,0,0,0.1);">
                            <div style="font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; color: var(--primary-color);"><i class="fa-solid fa-reply"></i> ตอบกลับจากสภา</div>
                            <textarea id="reply-${complaint.firebaseId || index}" style="width: 100%; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.8rem; padding: 6px; min-height: 50px; margin-bottom: 5px; outline: none;" placeholder="พิมพ์ข้อความตอบกลับถึงผู้ร้องเรียน...">${complaint.adminReply || ''}</textarea>
                            <button class="btn btn-primary" style="font-size: 0.75rem; padding: 4px 10px;" onclick="saveReply('${complaint.firebaseId || index}')">บันทึกข้อความ</button>
                        </div>
                    </td>
                    <td data-label="หมวดหมู่">${complaint.category}</td>
                    <td data-label="วันที่แจ้ง">${complaint.date}</td>
                    <td data-label="สถานะ">
                        <select class="badge-select ${complaint.status}" onchange="updateStatus('${complaint.firebaseId || index}', this.value)">
                            <option value="pending" ${complaint.status === 'pending' ? 'selected' : ''}>รอดำเนินการ</option>
                            <option value="progress" ${complaint.status === 'progress' ? 'selected' : ''}>กำลังดำเนินการ</option>
                            <option value="resolved" ${complaint.status === 'resolved' ? 'selected' : ''}>แก้ไขแล้ว</option>
                            <option value="cancelled" ${complaint.status === 'cancelled' ? 'selected' : ''}>คำขอถูกยกเลิก</option>
                        </select>
                    </td>
                    <td data-label="การจัดการ">
                        <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 0.8rem; background: rgba(239, 68, 68, 0.1); color: #ef4444;" onclick="deleteComplaint('${complaint.firebaseId || index}')">ลบ</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function updateStatus(id, newStatus) {
            if (firebaseAppInitialized) {
                await firebase.database().ref('complaints/' + id).update({ status: newStatus });
            } else {
                let complaints = JSON.parse(localStorage.getItem('university_complaints')) || [];
                complaints[id].status = newStatus;
                localStorage.setItem('university_complaints', JSON.stringify(complaints));
                loadAdminComplaints();
            }
        }

        async function saveReply(id) {
            const replyText = document.getElementById(`reply-${id}`).value;
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> บันทึกแล้ว';
            btn.style.background = 'var(--status-resolved)';
            
            if (firebaseAppInitialized) {
                await firebase.database().ref('complaints/' + id).update({ adminReply: replyText });
            } else {
                let complaints = JSON.parse(localStorage.getItem('university_complaints')) || [];
                if(complaints[id]) {
                    complaints[id].adminReply = replyText;
                    localStorage.setItem('university_complaints', JSON.stringify(complaints));
                }
            }
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = 'var(--primary-color)';
            }, 2000);
        }

        async function deleteComplaint(id) {
            if (!confirm('ยืนยันที่จะลบหัวข้อเรื่องร้องเรียนนี้ใช่หรือไม่?')) return;
            if (firebaseAppInitialized) {
                await firebase.database().ref('complaints/' + id).remove();
            } else {
                let complaints = JSON.parse(localStorage.getItem('university_complaints')) || [];
                complaints.splice(id, 1);
                localStorage.setItem('university_complaints', JSON.stringify(complaints));
                loadAdminComplaints();
            }
        }
    </script>
</body>
</html>
